name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Publish
        run: dotnet publish -c Release -o publish -p:BlazorWebAssemblyEnableSubresourceIntegrity=false

      - name: Fix base href for GitHub Pages
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path

          repo_name = "${{ github.repository }}".split("/", 1)[-1]
          path = Path('publish/wwwroot/index.html')
          text = path.read_text(encoding='utf-8')
          text = re.sub(r'<base href="[^"]*" />', f'<base href="/{repo_name}/" />', text)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove all integrity attributes (disable SRI)
        run: |
          find publish/wwwroot -type f -name '*.html' -exec sed -i 's/ integrity="[^"]*"//g' {} +
          find publish/wwwroot -type f -name '*.js' -exec sed -i 's/ integrity:"[^"]*",//g' {} +

      - name: Disable Blazor boot manifest SRI
        run: |
          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path('publish/wwwroot/_framework/blazor.boot.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['cacheBootResources'] = False
          runtime_assets = data.get('runtimeAssets', {})
          if isinstance(runtime_assets, dict):
              for item in runtime_assets.values():
                  if isinstance(item, dict) and 'hash' in item:
                      item.pop('hash', None)
          path.write_text(json.dumps(data, indent=2), encoding='utf-8')
          PY

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4